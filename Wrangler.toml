name = "cf-ai-study-buddy"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding
[ai]
binding = "AI"

# Durable Objects binding for persistent chat sessions
[[durable_objects.bindings]]
name = "CHAT_SESSION"
class_name = "ChatSession"

# Durable Object migration (required on first deploy)
[[migrations]]
tag = "v1"
new_classes = ["ChatSession"]
