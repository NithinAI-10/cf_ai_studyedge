<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Buddy — AI Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c20;
      --border: #2a2a30;
      --accent: #c8f060;
      --accent2: #60c8f0;
      --text: #f0ede6;
      --muted: #6b6b78;
      --user-bubble: #1e2a10;
      --ai-bubble: #111318;
      --danger: #f06060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-text {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    #clear-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .chat-container {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .welcome {
      text-align: center;
      padding: 48px 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .welcome h2 em {
      color: var(--accent);
      font-style: normal;
    }

    .welcome p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      max-width: 380px;
      margin: 0 auto 24px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 240, 96, 0.05);
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      opacity: 0;
      animation: fadeUp 0.3s ease forwards;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--accent); color: #000; }
    .message.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.7;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(200, 240, 96, 0.15);
      color: var(--text);
      border-radius: 12px 12px 4px 12px;
    }

    .message.assistant .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 4px;
    }

    .message.assistant .bubble code {
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--accent2);
    }

    /* Typing indicator */
    .typing-indicator .bubble {
      padding: 16px;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dots span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: dotBounce 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }

    #message-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
      overflow-y: auto;
    }

    #message-input:focus {
      border-color: rgba(200, 240, 96, 0.4);
    }

    #message-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 18px;
    }

    #send-btn:hover { background: #d4f570; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    .input-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .error-msg {
      background: rgba(240, 96, 96, 0.1);
      border: 1px solid rgba(240, 96, 96, 0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">Study<span>Buddy</span></div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-text">LLAMA 3.3 · WORKERS AI</span>
    <button id="clear-btn">↺ New Chat</button>
  </div>
</header>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="message-input"
      placeholder="Ask anything... e.g. 'Explain recursion like I'm 10'"
      rows="1"
    ></textarea>
    <button id="send-btn" title="Send">↑</button>
  </div>
  <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
</div>

<script>
  // ─── Config ────────────────────────────────────────────────────────────────
  // Replace with your deployed Worker URL
  const WORKER_URL = 'https://cf-ai-study-buddy.<YOUR_SUBDOMAIN>.workers.dev';

  // ─── State ─────────────────────────────────────────────────────────────────
  let sessionId = localStorage.getItem('studybuddy_session') || crypto.randomUUID();
  localStorage.setItem('studybuddy_session', sessionId);
  let isLoading = false;

  // ─── DOM refs ──────────────────────────────────────────────────────────────
  const chat = document.getElementById('chat');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');

  // ─── Welcome Screen ────────────────────────────────────────────────────────
  function showWelcome() {
    chat.innerHTML = `
      <div class="welcome">
        <div class="welcome-icon">🧠</div>
        <h2>Your personal <em>AI tutor</em></h2>
        <p>Ask me anything — from calculus to code, history to chemistry. I remember our whole conversation.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain recursion simply</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">How does DNA replication work?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">What is the Socratic method?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Solve: 2x² + 5x - 3 = 0</button>
        </div>
      </div>`;
  }

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  // ─── Load history on startup ───────────────────────────────────────────────
  async function loadHistory() {
    try {
      const res = await fetch(`${WORKER_URL}/history?sessionId=${sessionId}`);
      const data = await res.json();
      if (data.messages && data.messages.length > 0) {
        chat.innerHTML = '';
        data.messages.forEach(m => appendMessage(m.role, m.content, false));
        scrollToBottom();
      } else {
        showWelcome();
      }
    } catch {
      showWelcome();
    }
  }

  // ─── Render message bubble ─────────────────────────────────────────────────
  function appendMessage(role, content, animate = true) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (!animate) div.style.animation = 'none', div.style.opacity = '1';

    const avatarIcon = role === 'user' ? '👤' : '🎓';
    div.innerHTML = `
      <div class="avatar">${avatarIcon}</div>
      <div class="bubble">${escapeHtml(content)}</div>`;
    chat.appendChild(div);
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant typing-indicator';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">🎓</div>
      <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function showError(msg) {
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = `⚠ ${msg}`;
    chat.appendChild(div);
    scrollToBottom();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  function scrollToBottom() {
    setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
  }

  // ─── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const message = input.value.trim();
    if (!message || isLoading) return;

    // Remove welcome screen if present
    chat.querySelector('.welcome')?.parentElement.remove() || (chat.innerHTML = '');
    if (chat.querySelector('.welcome')) chat.innerHTML = '';

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    autoResize();

    appendMessage('user', message);
    showTyping();
    scrollToBottom();

    try {
      const res = await fetch(`${WORKER_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        showError(data.error);
      } else {
        appendMessage('assistant', data.reply);
        scrollToBottom();
      }
    } catch (err) {
      removeTyping();
      showError('Could not reach the server. Check your Worker URL.');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ─── Clear session ─────────────────────────────────────────────────────────
  clearBtn.addEventListener('click', async () => {
    await fetch(`${WORKER_URL}/session?sessionId=${sessionId}`, { method: 'DELETE' });
    sessionId = crypto.randomUUID();
    localStorage.setItem('studybuddy_session', sessionId);
    showWelcome();
  });

  // ─── Input handling ────────────────────────────────────────────────────────
  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  input.addEventListener('input', autoResize);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ─── Init ──────────────────────────────────────────────────────────────────
  loadHistory();
  input.focus();
</script>
</body>
</html>
